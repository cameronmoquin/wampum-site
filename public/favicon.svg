<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Quahog clamshell - the source of wampum -->
  <!-- Outer shell shape -->
  <path d="M32 6C16 6 4 19 4 34c0 12 10 20 18 22 3 1 7 2 10 2s7-1 10-2c8-2 18-10 18-22C60 19 48 6 32 6z" fill="#8E6E63"/>
  <!-- Inner shell color - darker -->
  <path d="M32 10C19 10 9 21 9 33c0 9 7 16 14 18 3 1 6 1.5 9 1.5s6-.5 9-1.5c7-2 14-9 14-18C55 21 45 10 32 10z" fill="#6D4C41"/>
  <!-- Purple streak - the valuable part -->
  <path d="M24 28c2 4 4 12 8 26 4-14 6-22 8-26" fill="#4A148C" opacity="0.85"/>
  <path d="M26 30c1.5 4 3 10 6 22 3-12 4.5-18 6-22" fill="#7B1FA2" opacity="0.5"/>
  <!-- Shell ridges radiating from hinge -->
  <path d="M32 10C28 18 22 26 14 36" stroke="#5D4037" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M32 10C30 18 26 28 20 38" stroke="#5D4037" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M32 10C34 18 38 28 44 38" stroke="#5D4037" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M32 10C36 18 42 26 50 36" stroke="#5D4037" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M32 10C32 20 32 30 32 44" stroke="#5D4037" stroke-width="0.6" fill="none" opacity="0.3"/>
  <!-- Growth rings -->
  <path d="M14 32c4-4 10-8 18-8s14 4 18 8" stroke="#5D4037" stroke-width="0.6" fill="none" opacity="0.3"/>
  <path d="M10 38c5-5 12-9 22-9s17 4 22 9" stroke="#5D4037" stroke-width="0.6" fill="none" opacity="0.25"/>
  <!-- Hinge at top -->
  <ellipse cx="32" cy="10" rx="5" ry="3" fill="#4E342E"/>
  <!-- Subtle highlight -->
  <path d="M20 18c4-3 8-5 12-5s8 2 12 5" stroke="#A1887F" stroke-width="0.5" fill="none" opacity="0.4"/>
</svg>
